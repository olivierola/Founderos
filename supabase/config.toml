# Activation Engine + embeddable widget — public surfaces. The widget is loaded
# via a plain <script> tag (no auth header), and the activation endpoints are
# identified by the agent public_key, like the other rag-* public functions.
[functions.rag-widget]
verify_jwt = false

[functions.rag-activation-tick]
verify_jwt = false

[functions.rag-activation-feedback]
verify_jwt = false

# The external Ops Runner authenticates with X-Runner-Token (hashed against
# ops_settings.runner_token_hash) — it has no Supabase JWT.
[functions.ops-runner-poll]
verify_jwt = false

# E2E testing: the orchestrator verifies the user session manually; the runner
# poll authenticates with X-Runner-Token (no JWT), like ops-runner-poll.
[functions.test-run-orchestrate]
verify_jwt = false

[functions.test-runner-poll]
verify_jwt = false

# Armada: scan a GitHub repo and generate an E2E suite (manual user-session check).
[functions.armada-generate-tests]
verify_jwt = false

# Connector actions: agents call CRM/HR APIs server-side (service role or member).
[functions.connector-action]
verify_jwt = false

# Project inbox: post a channel message + dispatch @mentioned agents.
[functions.project-inbox-post]
verify_jwt = false

# Security scanning: passive checks inline + active scans queued (consent-gated).
[functions.security-scan]
verify_jwt = false

# Security scan runner endpoint (X-Runner-Token, no JWT).
[functions.security-scan-poll]
verify_jwt = false

# PostHog import + connector test re-validation (manual user-session checks).
[functions.sync-posthog]
verify_jwt = false

[functions.test-connection]
verify_jwt = false
